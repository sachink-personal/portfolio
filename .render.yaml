services:
  - type: web
    name: portfolio-app
    env: python
    region: oregon
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
      python -c "import base64; open('credentials.json','w').write(base64.b64decode('').decode())"
    startCommand: streamlit run main.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PORT
        value: 8080
      - key: SHEET_ID
        sync: false
      - key: TICKERTAPE_USERNAME
        sync: false
      - key: TICKERTAPE_PASSWORD
        sync: false
