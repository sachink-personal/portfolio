# Render Deployment Configuration
# Reference: https://render.com/docs/yaml

services:
  # Web service for Streamlit dashboard
  - type: web
    name: portfolio-web
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=8501 --server.enableCORS=false
    healthCheck:
      path: /_stcore/health
      interval: 30
      timeout: 10

# Environment variables (configure these in Render dashboard or here)
env:
  - key: GOOGLE_SHEET_ID
    sync: false
  - key: EMAIL_SENDER
    sync: false
  - key: EMAIL_PASSWORD
    sync: false
  - key: SCREEN_MODE
    value: tickertape

# Cron jobs for daily emails (configure these in Render dashboard)
cronTriggers:
  - cron: "0 2 * * *"  # Daily at 8 AM IST
    command: python main.py --daily
  - cron: "0 3 * * 6"  # Weekly on Saturday at ~8:30 AM IST
    command: python main.py --weekly
  - cron: "0 3 1-7 * 6"  # Monthly on 1st Saturday at ~8:30 AM IST
    command: python main.py --monthly
