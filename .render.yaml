services:
  - type: web
    name: portfolio-app
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.enableCORS false
    envVars:
      - key: DB_PATH
        value: /opt/render/project/src/portfolio.db
      - key: EMAIL_SENDER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_RECIPIENT
        sync: false
      - key: SCREEN_MODE
        value: tickertape